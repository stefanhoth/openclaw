name: Custom Image

on:
  push:
    branches:
      - main
    paths:
      - "override/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-custom
  BROWSER_IMAGE: ghcr.io/${{ github.repository_owner }}/openclaw-browser

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve openclaw base version
        id: base
        shell: bash
        run: |
          set -euo pipefail
          version=$(git tag -l 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' \
            | head -1 | sed 's/^v//')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.BROWSER_IMAGE }}:${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        shell: bash
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          sha="${GITHUB_SHA::8}"
          {
            echo "value<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${sha}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve OCI labels
        id: labels
        shell: bash
        run: |
          set -euo pipefail
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "value<<EOF"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${GITHUB_SHA::8}"
            echo "org.opencontainers.image.created=${created}"
            echo "org.opencontainers.image.base.name=${{ steps.base.outputs.image }}"
            echo "ai.openclaw.base.version=${{ steps.base.outputs.version }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push custom image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: override
          file: override/Dockerfile.custom
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: ${{ steps.tags.outputs.value }}
          labels: ${{ steps.labels.outputs.value }}
          provenance: false
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
